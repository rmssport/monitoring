modules:
    mempools:
        data:
            -
                total: HIK-DEVICE-MIB::memSize
                percent_used: HIK-DEVICE-MIB::memUsed
                precision: 1048576
    os:
        hardware:
            - HIK-DEVICE-MIB::deviceType.0
            - .1.3.6.1.4.1.54747.1.1.0
        version:
            - HIK-DEVICE-MIB::softwVersion.0
            - .1.3.6.1.4.1.54747.1.3.0
    processors:
        data:
            -
                oid: HIK-DEVICE-MIB::cpuPercent
                num_oid: '.1.3.6.1.4.1.39165.1.7.{{ $index }}'
                index: 0
    storage:
        data:
            -
                descr: HIK-DEVICE-MIB::Storage
                size: HIK-DEVICE-MIB::diskSize.0
                percent_used: HIK-DEVICE-MIB::diskPercent.0
                percent_used_num_oid: '.1.3.6.1.4.1.39165.1.9.{{ $index }}'
