os: abus-cam
text: 'ABUS Camera'
type: network
icon: hikvision
mib_dir: hikvision
over:
    - { graph: device_processor, text: 'CPU Usage' }
    - { graph: device_mempool, text: 'Memory Usage' }
discovery:
    -   sysObjectID_regex: '/^$/'
        snmpget:
            oid: .1.3.6.1.4.1.39165.1.6.0
            op: '='
            value: IPcamera
    -   sysObjectID_regex: '/^$/'
        snmpget:
            oid: .1.3.6.1.4.1.54747.1.6.0
            op: '='
            value: IPcamera
